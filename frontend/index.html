<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whiteboard MVP</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <h1>Whiteboard MVP</h1>
      <div class="field">
        <label for="boardName">Nome da pasta/board</label>
        <input id="boardName" type="text" value="Meu Board" />
      </div>

      <section class="folders-panel">
        <h2>Pastas</h2>
        <div class="folder-create">
          <input id="newFolderName" type="text" placeholder="Nova pasta" />
          <button id="createFolderBtn" type="button">Criar pasta</button>
        </div>
        <div id="foldersList" class="folders-list"></div>
      </section>

      <h2>Elementos</h2>
      <div class="toolbar-grid">
        <button data-action="add-text">Texto</button>
        <button data-action="add-note">Sticky Note</button>
        <button data-action="add-list">Lista</button>
        <button data-action="add-column">Coluna</button>
        <button data-action="add-card">Card</button>
        <button data-action="add-task">Tarefa</button>
        <button data-action="add-table">Tabela</button>
        <button data-action="add-folder">Grupo/Pasta</button>
        <button data-action="add-checklist">Checklist</button>
        <button data-action="add-progress">Progresso</button>
        <button data-action="add-rect">Retângulo</button>
        <button data-action="add-circle">Círculo</button>
        <button data-action="add-arrow">Seta Livre</button>
        <button data-action="connect-selected">Conectar itens</button>
      </div>

      <h2>Persistência</h2>
      <div class="toolbar-grid">
        <button data-action="save-board">Salvar no backend</button>
        <button data-action="load-board">Carregar da URL/lista</button>
      </div>

      <section id="inspectorPanel" class="inspector">
        <h2 id="inspectorTitle">Nenhum elemento selecionado</h2>
        <p id="inspectorEmpty" class="hint">Selecione um elemento no board para editar textos, dimensões e propriedades.</p>
        <form id="inspectorForm" hidden></form>
        <button id="deleteSelected" class="danger" type="button" disabled>Excluir elemento selecionado</button>
      </section>

      <p class="hint">Dica: clique no checkbox da tarefa para marcar/desmarcar. Dê duplo clique em colunas/cards/tarefas para edição rápida.</p>
      <p id="status" class="status">Pronto.</p>
    </aside>

    <main class="board-area">
      <div id="boardContainer"></div>
    </main>

    <div id="contextMenu" class="context-menu" hidden>
      <button id="contextDelete" type="button">Excluir elemento</button>
    </div>

    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
