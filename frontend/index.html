<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whiteboard MVP</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <h1>Whiteboard MVP</h1>
      <div class="field">
        <label for="boardName">Nome do board</label>
        <input id="boardName" type="text" value="Meu Board" />
      </div>

      <h2>Elementos</h2>
      <div class="toolbar-grid">
        <button data-action="add-text">Texto</button>
        <button data-action="add-note">Sticky Note</button>
        <button data-action="add-list">Lista</button>
        <button data-action="add-column">Coluna</button>
        <button data-action="add-table">Tabela</button>
        <button data-action="add-folder">Pasta</button>
        <button data-action="add-checklist">Checklist</button>
        <button data-action="add-progress">Progresso</button>
        <button data-action="add-rect">Retângulo</button>
        <button data-action="add-circle">Círculo</button>
        <button data-action="add-arrow">Seta Livre</button>
        <button data-action="connect-selected">Conectar 2 itens</button>
      </div>

      <h2>Ações de agrupamento</h2>
      <div class="toolbar-grid">
        <button data-action="move-to-folder">Mover seleção p/ pasta</button>
        <button data-action="back-folder">Voltar para raiz</button>
      </div>

      <h2>Arquivos e exportação</h2>
      <div class="toolbar-grid">
        <label class="button-like">
          Importar imagem
          <input id="imageInput" type="file" accept="image/*" hidden />
        </label>
        <label class="button-like">
          Importar JSON
          <input id="jsonInput" type="file" accept="application/json" hidden />
        </label>
        <button data-action="export-json">Exportar JSON</button>
        <button data-action="export-png">Exportar PNG</button>
        <button data-action="export-pdf">Exportar PDF</button>
      </div>

      <h2>Persistência</h2>
      <div class="toolbar-grid">
        <button data-action="save-board">Salvar no backend</button>
        <button data-action="load-board">Carregar último</button>
      </div>

      <h2>Editor rápido (menu suspenso)</h2>
      <div id="inspector" class="inspector hidden">
        <div class="field">
          <label for="editText">Texto/Título</label>
          <input id="editText" type="text" />
        </div>
        <div class="field">
          <label for="editProgress">Progresso (0-100)</label>
          <input id="editProgress" type="number" min="0" max="100" />
        </div>
        <div class="items-editor">
          <div class="items-header">
            <span>Itens / Cards</span>
            <button id="addItemBtn" type="button">+ Item</button>
          </div>
          <ul id="itemList"></ul>
        </div>
        <div class="field">
          <label>Tabela</label>
          <div class="toolbar-grid">
            <button id="addRowBtn" type="button">+ Linha</button>
            <button id="removeRowBtn" type="button">- Linha</button>
            <button id="addColBtn" type="button">+ Coluna</button>
            <button id="removeColBtn" type="button">- Coluna</button>
          </div>
          <small>Dica: clique numa célula da tabela para editar.</small>
        </div>
      </div>

      <p class="hint">Pan: botão do meio. Zoom: scroll. Duplo clique em pasta para entrar.</p>
      <p id="scopeLabel" class="hint">Escopo atual: Raiz</p>
      <p id="status" class="status">Pronto.</p>
    </aside>

    <main class="board-area">
      <div id="boardContainer"></div>
    </main>

    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
